name: next-quality

on:
  push:
    paths:
      - "app-next/**"
      - ".github/workflows/next-quality.yml"
  pull_request:
    paths:
      - "app-next/**"
      - ".github/workflows/next-quality.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-next

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: app-next/package.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
